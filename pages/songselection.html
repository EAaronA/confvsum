<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>CONFVSUM | Song Selection</title>

    <link rel="stylesheet" href="../css/songselection.css">

    <script src="https://unpkg.com/wavesurfer.js"></script>

</head>

<body>

<div class="container">

    <div class="album-panel">

        <img
        id="cover"
        src="../assets/confvsvm-Port.png"
        alt="CONFVSUM">

        <h1>CONFVSUM</h1>

        <p>Collector Edition</p>

    </div>

    <div class="track-panel">

        <h2>TRACKLIST</h2>

        <ul id="trackList"></ul>

    </div>

</div>

<div id="playerSection">

    <div id="currentSong">

        Selecciona una canción

    </div>

    <div id="songInfo"></div>

    <div id="waveform"></div>

    <div class="controls">

        <button id="prevBtn">⏮</button>

        <button id="playBtn">▶</button>

        <button id="nextBtn">⏭</button>

    </div>

        <button id="backBtn">
            RETURN
        </button>

</div>

    <!-- Pantalla final -->

<div id="unlockScreen">

    <div class="unlock-content">

        <h1>SONG SELECTION</h1>

        <h2>COMPLETADO</h2>

        <p>

            Has escuchado todas las canciones del álbum,
            <strong>Vientos</strong>.

            Ahora puedes acceder al apartado
            <strong>Lyric Video</strong> para explorar
            la letra de cada canción.

        </p>

        <a href="../index.html">

            CONTINUAR

        </a>

    </div>

</div>
<script src="../js/unlocks.js"></script>
<script src="../js/songselection.js"></script>

</body>
</html>
